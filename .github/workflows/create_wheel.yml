
name: Publish package

on:
  push:
    branches: [ master, wheel ]
    tags:
      - '*'
  pull_request:
    branches:
      - '*'


jobs:
  build-wheel:
    runs-on: ubuntu-latest

    steps:
      - name: Clone github repository
        uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - run: pip install build
      - run: python -m build

      - name: Upload wheels to GH artifacts
        uses: actions/upload-artifact@v7
        with:
          name: wheel
          path: dist/

  upload-wheel:
    runs-on: ubuntu-latest
    needs: [build-wheel]

    steps:
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - uses: actions/download-artifact@v8
        with:
          pattern: wheel*
          path: dist/

      #- name: Publish to test PyPI
      #  if: github.event_name == 'push' && startsWith(github.event.ref, 'refs/tags/')
      #  uses: pypa/gh-action-pypi-publish@release/v1
      #  with:
      #    user: __token__
      #    password: ${{ secrets.TEST_PYPI_API_TOKEN }}
      #    packages-dir: dist/
      #    skip-existing: true
      #    repository-url: https://test.pypi.org/legacy/

  test-wheel:
    needs: [build-wheel]

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: wheel*
          path: dist/

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package (unix)
        if: runner.os != 'Windows'
        run: |
          ls -l dist
          python -m pip install --upgrade pip
          pip install dist/*.whl


      - name: Install package (Windows)
        if: runner.os == 'Windows'
        run: |
          python -m pip install --upgrade pip
          Get-ChildItem dist\*.whl | ForEach-Object { pip install $_.FullName }

      - name: Install test dependencies
        run: pip install pytest

      - name: Clone github repository
        uses: actions/checkout@v6


      - name: Remove src (Unix)
        if: runner.os != 'Windows'
        run: rm -rf src

      - name: Remove src (Windows)
        if: runner.os == 'Windows'
        run: Remove-Item -Recurse -Force src

      - name: Run tests
        run: |
          pytest -v


